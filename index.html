<!DOCTYPE html>
<html>
<head>
<title>Gorilla City Run</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>
const gorillaImg = new Image();
gorillaImg.src = "Copilot_20260704_022408.png";

<script>
// CANVAS SETUP
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// GAME VARIABLES
let timer = 60;
let score = 0;
let jungle = true;

// GORILLA
let gorilla = {
  x: 100,
  y: canvas.height - 200,
  w: 80,
  h: 80,
  vy: 0,
  jumping: false,
  speed: 10
};

// OBJECT ARRAYS
let bananas = [];
let mushrooms = [];
let fires = [];

// SOUNDS (royalty-free)
const jungleMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c7e90c9b7.mp3?filename=jungle-ambient-20468.mp3");
jungleMusic.loop = true;

const cityMusic = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_4b7e90c9b7.mp3?filename=city-night-ambience-20469.mp3");
cityMusic.loop = true;

const jumpSound = new Audio("https://cdn.pixabay.com/download/audio/2021/09/20/audio_4f3e.mp3?filename=jump-8021.mp3");
const fireSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c7e90c9b7.mp3?filename=fireball-20470.mp3");
const smashSound = new Audio("https://cdn.pixabay.com/download/audio/2021/09/20/audio_3f3e.mp3?filename=smash-8022.mp3");
const collectSound = new Audio("https://cdn.pixabay.com/download/audio/2021/09/20/audio_2f3e.mp3?filename=collect-8023.mp3");

// START MUSIC
jungleMusic.play();

// SPAWN BANANAS
function spawnBanana() {
  bananas.push({
    x: Math.random() * canvas.width,
    y: Math.random() * (canvas.height - 300),
    w: 30,
    h: 30,
    frame: 0
  });
}

// SPAWN MUSHROOMS
function spawnMushroom() {
  mushrooms.push({
    x: Math.random() * canvas.width,
    y: canvas.height - 180,
    w: 50,
    h: 50,
    dx: (Math.random() * 4) + 2
  });
}

// FIREBALL
function spitFire() {
  fireSound.play();
  fires.push({
    x: gorilla.x + gorilla.w,
    y: gorilla.y + gorilla.h / 2,
    w: 20,
    h: 10,
    speed: 15
  });
}

// CONTROLS
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") gorilla.x += gorilla.speed;
  if (e.key === "ArrowLeft") gorilla.x -= gorilla.speed;

  if (e.key === " " && !gorilla.jumping) {
    gorilla.jumping = true;
    gorilla.vy = -25;
    jumpSound.play();
  }

  if (e.key === "f") spitFire();
});

// GAME LOOP
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BACKGROUND TRANSITION
  if (timer <= 30 && jungle) {
    jungle = false;
    jungleMusic.pause();
    cityMusic.play();
  }

  ctx.fillStyle = jungle ? "#0a3d0a" : "#333";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // GROUND
  ctx.fillStyle = jungle ? "#145214" : "#222";
  ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

  // GORILLA (realistic block placeholder)
  ctx.fillStyle = "#4a2c2a";
  ctx.ctx.drawImage(gorillaImg, gorilla.x, gorilla.y, gorilla.w, gorilla.h);


  // GRAVITY
  gorilla.vy += 1.5;
  gorilla.y += gorilla.vy;
  if (gorilla.y >= canvas.height - 200) {
    gorilla.y = canvas.height - 200;
    gorilla.jumping = false;
  }

  // BANANAS
  bananas.forEach((b, i) => {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(b.x, b.y, 15, 0, Math.PI * 2);
    ctx.fill();

    // COLLISION
    if (gorilla.x < b.x + b.w &&
        gorilla.x + gorilla.w > b.x &&
        gorilla.y < b.y + b.h &&
        gorilla.y + gorilla.h > b.y) {
      bananas.splice(i, 1);
      score += 10;
      collectSound.play();
    }
  });

  // MUSHROOMS
  mushrooms.forEach((m, i) => {
    ctx.fillStyle = "red";
    ctx.fillRect(m.x, m.y, m.w, m.h);

    m.x += m.dx;
    if (m.x > canvas.width) m.x = -50;

    // SMASH
    if (gorilla.x < m.x + m.w &&
        gorilla.x + gorilla.w > m.x &&
        gorilla.y < m.y + m.h &&
        gorilla.y + gorilla.h > m.y) {
      mushrooms.splice(i, 1);
      score += 20;
      smashSound.play();
    }
  });

  // FIREBALLS
  fires.forEach((f, i) => {
    ctx.fillStyle = "orange";
    ctx.fillRect(f.x, f.y, f.w, f.h);

    f.x += f.speed;

    mushrooms.forEach((m, j) => {
      if (f.x < m.x + m.w &&
          f.x + f.w > m.x &&
          f.y < m.y + m.h &&
          f.y + f.h > m.y) {
        mushrooms.splice(j, 1);
        fires.splice(i, 1);
        score += 30;
        smashSound.play();
      }
    });
  });

  // TIMER + SCORE
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Time: " + timer, 20, 40);
  ctx.fillText("Score: " + score, 20, 80);

  // GAME OVER
  if (timer <= 0) {
    ctx.fillStyle = "black";
    ctx.globalAlpha = 0.7;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);
    ctx.font = "40px Arial";
    ctx.fillText("Final Score: " + score, canvas.width / 2 - 130, canvas.height / 2 + 60);
    return;
  }

  requestAnimationFrame(gameLoop);
}

// TIMERS
setInterval(() => timer--, 1000);
setInterval(spawnBanana, 2000);
setInterval(spawnMushroom, 3000);

// START GAME
gameLoop();
</script>

</body>
</html>
