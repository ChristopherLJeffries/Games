<!DOCTYPE html>
<html>
<head>
<title>Gorilla City Run</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// =========================
// CANVAS SETUP
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =========================
// LOAD IMAGES
// =========================
const gorillaImg = new Image();
gorillaImg.src = "gorilla.png";

const bananaImg = new Image();
bananaImg.src = "banana.png";

const mushroomImg = new Image();
mushroomImg.src = "mushroom.png";

const fireImg = new Image();
fireImg.src = "fireball.png";

const jungleBg = new Image();
jungleBg.src = "jungle_bg.png";

const cityBg = new Image();
cityBg.src = "city_bg.png";

// =========================
// GAME VARIABLES
// =========================
let timer = 60;
let score = 0;
let jungle = true;
let bgOffset = 0;

// =========================
// GORILLA
// =========================
let gorilla = {
  x: 150,
  y: canvas.height - 220,
  w: 120,
  h: 120,
  vy: 0,
  jumping: false,
  speed: 10,
  frame: 0,
  frameTime: 0,
  facingRight: true
};

// =========================
// OBJECT ARRAYS
// =========================
let bananas = [];
let mushrooms = [];
let fires = [];

// =========================
// SPAWN FUNCTIONS
// =========================
function spawnBanana() {
  bananas.push({
    x: Math.random() * (canvas.width - 100),
    y: Math.random() * (canvas.height - 300),
    w: 40,
    h: 40
  });
}

function spawnMushroom() {
  mushrooms.push({
    x: -60,
    y: canvas.height - 180,
    w: 60,
    h: 60,
    dx: (Math.random() * 2) + 2
  });
}

function spitFire() {
  fires.push({
    x: gorilla.x + (gorilla.facingRight ? gorilla.w : -20),
    y: gorilla.y + gorilla.h / 2,
    w: 40,
    h: 20,
    speed: gorilla.facingRight ? 15 : -15
  });
}

// =========================
// CONTROLS
// =========================
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    gorilla.x += gorilla.speed;
    gorilla.facingRight = true;
  }
  if (e.key === "ArrowLeft") {
    gorilla.x -= gorilla.speed;
    gorilla.facingRight = false;
  }
  if (e.key === " " && !gorilla.jumping) {
    gorilla.jumping = true;
    gorilla.vy = -25;
  }
  if (e.key === "f") spitFire();
});

// =========================
// COLLISION
// =========================
function collide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// =========================
// GAME LOOP
// =========================
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BACKGROUND SCROLL
  bgOffset -= jungle ? 1 : 2;
  let bg = jungle ? jungleBg : cityBg;
  ctx.drawImage(bg, bgOffset, 0, canvas.width, canvas.height);
  ctx.drawImage(bg, bgOffset + canvas.width, 0, canvas.width, canvas.height);
  if (bgOffset <= -canvas.width) bgOffset = 0;

  // SWITCH TO CITY
  if (timer <= 30) jungle = false;

  // GROUND
  ctx.fillStyle = jungle ? "#145214" : "#222";
  ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

  // GORILLA PHYSICS
  gorilla.vy += 1.5;
  gorilla.y += gorilla.vy;

  if (gorilla.y >= canvas.height - 220) {
    gorilla.y = canvas.height - 220;
    gorilla.jumping = false;
  }

  // SIMPLE ANIMATION
  gorilla.frameTime++;
  if (gorilla.frameTime > 8) {
    gorilla.frameTime = 0;
    gorilla.frame = (gorilla.frame + 1) % 2;
  }

  // DRAW GORILLA
  ctx.save();
  if (!gorilla.facingRight) {
    ctx.translate(gorilla.x + gorilla.w / 2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-gorilla.x - gorilla.w / 2, 0);
  }

  if (gorilla.jumping) {
    ctx.drawImage(gorillaImg, gorilla.x, gorilla.y, gorilla.w * 1.05, gorilla.h * 1.05);
  } else if (gorilla.frame === 0) {
    ctx.drawImage(gorillaImg, gorilla.x, gorilla.y, gorilla.w, gorilla.h);
  } else {
    ctx.drawImage(gorillaImg, gorilla.x, gorilla.y + 5, gorilla.w, gorilla.h * 0.9);
  }

  ctx.restore();

  // BANANAS
  bananas.forEach((b, i) => {
    ctx.drawImage(bananaImg, b.x, b.y, b.w, b.h);
    if (collide(gorilla, b)) {
      bananas.splice(i, 1);
      score += 10;
    }
  });

  // MUSHROOMS
  mushrooms.forEach((m, i) => {
    m.x += m.dx;
    if (m.x > canvas.width + 60) m.x = -60;

    ctx.drawImage(mushroomImg, m.x, m.y, m.w, m.h);

    if (collide(gorilla, m)) {
      mushrooms.splice(i, 1);
      score += 20;
    }
  });

  // FIREBALLS
  fires.forEach((f, i) => {
    f.x += f.speed;
    ctx.drawImage(fireImg, f.x, f.y, f.w, f.h);

    mushrooms.forEach((m, j) => {
      if (collide(f, m)) {
        mushrooms.splice(j, 1);
        fires.splice(i, 1);
        score += 30;
      }
    });

    if (f.x < -100 || f.x > canvas.width + 100) fires.splice(i, 1);
  });

  // HUD
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Time: " + timer, 20, 40);
  ctx.fillText("Score: " + score, 20, 80);

  // TIMER
  if (timer <= 0) {
    ctx.fillStyle = "black";
    ctx.globalAlpha = 0.7;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    ctx.fillStyle = "white";
    ctx.font = "60px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);
    ctx.font = "40px Arial";
    ctx.fillText("Final Score: " + score, canvas.width / 2 - 130, canvas.height / 2 + 60);
    return;
  }

  requestAnimationFrame(gameLoop);
}

// =========================
// TIMERS
// =========================
setInterval(() => timer--, 1000);
setInterval(spawnBanana, 2000);
setInterval(spawnMushroom, 3000);

// START GAME
gameLoop();
</script>

</body>
</html>
