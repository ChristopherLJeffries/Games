<!DOCTYPE html>
<html>
<head>
<title>Gorilla City Run</title>
<style>
  body { margin: 0; overflow: hidden; background: #228B22; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// GAME VARIABLES
let gorilla = { x: 100, y: canvas.height - 150, w: 60, h: 60, vy: 0, jumping: false };
let bananas = [];
let mushrooms = [];
let fires = [];
let jungle = true;
let timer = 60;

// SPAWN BANANAS
function spawnBanana() {
  bananas.push({
    x: Math.random() * canvas.width,
    y: Math.random() * (canvas.height - 200),
    w: 30,
    h: 30
  });
}

// SPAWN MUSHROOMS
function spawnMushroom() {
  mushrooms.push({
    x: Math.random() * canvas.width,
    y: canvas.height - 120,
    w: 40,
    h: 40
  });
}

// FIREBALL
function spitFire() {
  fires.push({
    x: gorilla.x + gorilla.w,
    y: gorilla.y + gorilla.h / 2,
    w: 20,
    h: 10,
    speed: 10
  });
}

// CONTROLS
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") gorilla.x += 20;
  if (e.key === "ArrowLeft") gorilla.x -= 20;
  if (e.key === " " && !gorilla.jumping) {
    gorilla.jumping = true;
    gorilla.vy = -20;
  }
  if (e.key === "f") spitFire();
});

// GAME LOOP
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BACKGROUND TRANSITION
  if (timer <= 30) jungle = false;
  ctx.fillStyle = jungle ? "#228B22" : "#444";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // GROUND
  ctx.fillStyle = jungle ? "#006400" : "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  // GORILLA
  ctx.fillStyle = "#654321";
  ctx.fillRect(gorilla.x, gorilla.y, gorilla.w, gorilla.h);

  // GRAVITY
  gorilla.vy += 1;
  gorilla.y += gorilla.vy;
  if (gorilla.y >= canvas.height - 160) {
    gorilla.y = canvas.height - 160;
    gorilla.jumping = false;
  }

  // BANANAS
  ctx.fillStyle = "yellow";
  bananas.forEach((b, i) => {
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // COLLISION
    if (gorilla.x < b.x + b.w &&
        gorilla.x + gorilla.w > b.x &&
        gorilla.y < b.y + b.h &&
        gorilla.y + gorilla.h > b.y) {
      bananas.splice(i, 1);
    }
  });

  // MUSHROOMS
  ctx.fillStyle = "red";
  mushrooms.forEach((m, i) => {
    ctx.fillRect(m.x, m.y, m.w, m.h);

    // SMASH
    if (gorilla.x < m.x + m.w &&
        gorilla.x + gorilla.w > m.x &&
        gorilla.y < m.y + m.h &&
        gorilla.y + gorilla.h > m.y) {
      mushrooms.splice(i, 1);
    }
  });

  // FIREBALLS
  ctx.fillStyle = "orange";
  fires.forEach((f, i) => {
    f.x += f.speed;
    ctx.fillRect(f.x, f.y, f.w, f.h);

    // HIT MUSHROOM
    mushrooms.forEach((m, j) => {
      if (f.x < m.x + m.w &&
          f.x + f.w > m.x &&
          f.y < m.y + m.h &&
          f.y + f.h > m.y) {
        mushrooms.splice(j, 1);
        fires.splice(i, 1);
      }
    });
  });

  // TIMER
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Time: " + timer, 20, 40);

  requestAnimationFrame(gameLoop);
}

setInterval(() => timer--, 1000);
setInterval(spawnBanana, 2000);
setInterval(spawnMushroom, 3000);

gameLoop();
</script>

</body>
</html>
