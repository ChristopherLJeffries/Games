<!DOCTYPE html>
<html>
<head>
<title>Gorilla Run — Enhanced Edition</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// =========================
// CANVAS SETUP
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =========================
// LOAD IMAGES (MUST MATCH FILENAMES)
// =========================
const IMAGES = {
  gorilla: load("gorilla.png"),
  banana: load("banana.png"),
  mushroom: load("mushroom.png"),
  fireball: load("fireball.png"),
  jungle: load("jungle_bg.png"),
  city: load("city_bg.png")
};

function load(src) {
  const img = new Image();
  img.src = src;
  return img;
}

// =========================
// GAME STATE
// =========================
let score = 0;
let timeLeft = 60; // 1 minute
let lastTime = 0;
let bgOffset = 0;
let inJungle = true;

// =========================
// PLAYER (GORILLA)
// =========================
const gorilla = {
  x: 150,
  y: canvas.height - 220,
  w: 120,
  h: 120,
  vy: 0,
  jumping: false,
  facingRight: true,
  frame: 0,
  frameTime: 0
};

// =========================
// OBJECT ARRAYS
// =========================
const bananas = [];
const mushrooms = [];
const fires = [];

// =========================
// SPAWN FUNCTIONS
// =========================
function spawnBanana() {
  bananas.push({
    x: Math.random() * (canvas.width - 100),
    y: Math.random() * (canvas.height - 300),
    w: 40,
    h: 40
  });
}

function spawnMushroom() {
  mushrooms.push({
    x: -60,
    y: canvas.height - 180,
    w: 60,
    h: 60,
    dx: (Math.random() * 2) + 2
  });
}

function spitFire() {
  fires.push({
    x: gorilla.x + (gorilla.facingRight ? gorilla.w : -20),
    y: gorilla.y + gorilla.h / 2,
    w: 40,
    h: 20,
    speed: gorilla.facingRight ? 15 : -15
  });
}

// =========================
// INPUT
// =========================
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    gorilla.x += 10;
    gorilla.facingRight = true;
  }
  if (e.key === "ArrowLeft") {
    gorilla.x -= 10;
    gorilla.facingRight = false;
  }
  if (e.key === " " && !gorilla.jumping) {
    gorilla.jumping = true;
    gorilla.vy = -25;
  }
  if (e.key === "f") spitFire();
});

// =========================
// COLLISION
// =========================
function collide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// =========================
// MAIN GAME LOOP
// =========================
function loop(timestamp) {
  const delta = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // TIMER
  timeLeft -= delta;
  if (timeLeft <= 30) inJungle = false;

  // GAME OVER
  if (timeLeft <= 0) {
    drawGameOver();
    return;
  }

  // BACKGROUND SCROLL
  bgOffset -= inJungle ? 100 * delta : 200 * delta;
  const bg = inJungle ? IMAGES.jungle : IMAGES.city;

  ctx.drawImage(bg, bgOffset, 0, canvas.width, canvas.height);
  ctx.drawImage(bg, bgOffset + canvas.width, 0, canvas.width, canvas.height);
  if (bgOffset <= -canvas.width) bgOffset = 0;

  // GROUND
  ctx.fillStyle = inJungle ? "#145214" : "#222";
  ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

  // GORILLA PHYSICS
  gorilla.vy += 60 * delta;
  gorilla.y += gorilla.vy;

  if (gorilla.y >= canvas.height - 220) {
    gorilla.y = canvas.height - 220;
    gorilla.jumping = false;
  }

  // GORILLA ANIMATION
  gorilla.frameTime += delta;
  if (gorilla.frameTime > 0.15) {
    gorilla.frameTime = 0;
    gorilla.frame = (gorilla.frame + 1) % 2;
  }

  // DRAW GORILLA
  ctx.save();
  if (!gorilla.facingRight) {
    ctx.translate(gorilla.x + gorilla.w / 2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-gorilla.x - gorilla.w / 2, 0);
  }

  ctx.drawImage(IMAGES.gorilla, gorilla.x, gorilla.y, gorilla.w, gorilla.h);
  ctx.restore();

  // BANANAS
  bananas.forEach((b, i) => {
    ctx.drawImage(IMAGES.banana, b.x, b.y, b.w, b.h);
    if (collide(gorilla, b)) {
      bananas.splice(i, 1);
      score += 10;
    }
  });

  // MUSHROOMS
  mushrooms.forEach((m, i) => {
    m.x += m.dx;
    if (m.x > canvas.width + 60) m.x = -60;

    ctx.drawImage(IMAGES.mushroom, m.x, m.y, m.w, m.h);

    if (collide(gorilla, m)) {
      mushrooms.splice(i, 1);
      score += 20;
    }
  });

  // FIREBALLS
  fires.forEach((f, i) => {
    f.x += f.speed;
    ctx.drawImage(IMAGES.fireball, f.x, f.y, f.w, f.h);

    mushrooms.forEach((m, j) => {
      if (collide(f, m)) {
        mushrooms.splice(j, 1);
        fires.splice(i, 1);
        score += 30;
      }
    });

    if (f.x < -100 || f.x > canvas.width + 100) fires.splice(i, 1);
  });

  // HUD
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Time: " + Math.ceil(timeLeft), 20, 40);
  ctx.fillText("Score: " + score, 20, 80);

  requestAnimationFrame(loop);
}

// =========================
// GAME OVER SCREEN
// =========================
function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "60px Arial";
  ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);

  ctx.font = "40px Arial";
  ctx.fillText("Final Score: " + score, canvas.width / 2 - 130, canvas.height / 2 + 60);
}

// =========================
// START GAME
// =========================
setInterval(spawnBanana, 2000);
setInterval(spawnMushroom, 3000);
requestAnimationFrame(loop);

</script>

</body>
</html>
